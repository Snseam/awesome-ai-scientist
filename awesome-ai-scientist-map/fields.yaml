uncertain:
- Current availability, pricing, and feature boundaries of commercial products should be rechecked during deep research.
- Some emerging 2025-2026 systems have papers before mature code releases; mark code availability as verified only after repository
  inspection.
- Benchmark leaderboards and model rankings change quickly; store exact access date and benchmark version.
- Claims of peer-review acceptance, real-world validation, or superhuman performance require primary-source confirmation.
- Relationships such as component lineage or product inheritance should be treated as inferred unless explicitly stated by
  primary sources.
