topic: "Awesome AI Scientist"
subtitle: "Verified ecosystem map of AI Scientist systems, papers, benchmarks, products, and open-source implementations"
generated_at: "2026-05-28"
time_range:
  primary: "2023-01-01 to 2026-05-28"
  note: "Include older lineage only when it directly explains current AI Scientist systems."
scope:
  goal: "Map systems that automate or strongly augment scientific research workflows, linking papers to code, products, datasets, benchmarks, and applications."
  include:
    - "End-to-end AI Scientist systems"
    - "Domain-specific autonomous discovery agents"
    - "Research synthesis and deep-research products"
    - "Benchmarks for research agents, scientific coding, ML experimentation, reproducibility, and discovery"
    - "Open-source implementations and datasets"
  exclude:
    - "General chatbots without research-specific workflows"
    - "Single-task scientific foundation models unless connected to agentic discovery workflows"
taxonomy:
  autonomy_levels:
    L0: "Reference tool: retrieves, summarizes, or analyzes under direct user control."
    L1: "Task assistant: completes bounded research subtasks with human steering."
    L2: "Workflow agent: chains search, coding, analysis, and writing across a defined task."
    L3: "Semi-autonomous research agent: proposes hypotheses and experiments, but needs human gating or external validation."
    L4: "End-to-end autonomous scientist: ideates, runs experiments, analyzes, writes, and self-evaluates in a bounded domain."
    L5: "Open-ended autonomous scientist with real-world intervention and durable safety controls."
  landscape_axes:
    - "Scientific lifecycle coverage"
    - "Domain scope"
    - "Tool and environment access"
    - "Evidence grounding and citation quality"
    - "Experiment execution and reproducibility"
    - "Peer review or benchmark validation"
    - "Safety, sandboxing, and governance"
execution:
  batch_size: 6
  items_per_agent: 3
  output_dir: "./results"
  recommended_deep_phase:
    - "Assign one agent per taxonomy cluster."
    - "Require at least one primary source per paper, codebase, product, and benchmark claim."
    - "Record uncertainty explicitly instead of filling gaps from secondary summaries."
